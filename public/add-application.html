<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Новая заявка - Водить.РФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="../assets/images/logo.png" alt="Водить.РФ" width="30" height="30">
            Водить.РФ
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Кабинет</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Выход</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Новая заявка</h2>
                        <div id="message"></div>
                        <form id="applicationForm">
                            <div class="mb-3">
                                <label class="form-label">Выберите тип транспорта</label>
                                <select name="service_id" class="form-select" required>
                                    <option value=""> Выберите </option>
                                    <option value="1"> Катер</option>
                                    <option value="2"> Круизный лайнер</option>
                                    <option value="3"> Яхта</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Желаемая дата начала</label>
                                <input type="date" name="start_date" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Способ оплаты</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" value="qr" required>
                                    <label class="form-check-label">Предоплата по QR-коду</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" value="mir_card">
                                    <label class="form-check-label">Оплата картой МИР</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment_method" value="postpay">
                                    <label class="form-check-label">Постоплата в офисе</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                        </form>
                        <p class="text-center mt-3"><a href="dashboard.html">← Вернуться в кабинет</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white mt-auto py-3">
    <div class="container text-center">
        <p class="small mb-0">© 2026 Водить.РФ | Речной транспорт</p>
    </div>
</footer>

<script src="../assets/js/app.js"></script>
</body>
</html>
