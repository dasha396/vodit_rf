<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ-панель - Водить.РФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="../assets/images/logo.png" alt="Водить.РФ" width="30" height="30">
            Водить.РФ
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Кабинет</a></li>
                <li class="nav-item"><a class="nav-link active" href="admin.html">Админка</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Выход</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1> Админ-панель</h1>
            <div>
                <span class="badge bg-danger fs-6 me-2" id="adminLogin">Администратор</span>
                <button class="btn btn-outline-danger btn-sm" id="logoutBtn2">Выйти</button>
            </div>
        </div>
        
        <div id="statsPanel" class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="card bg-primary text-white text-center">
                    <div class="card-body">
                        <h3 id="totalCount">0</h3>
                        <p>Всего заявок</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-dark text-center">
                    <div class="card-body">
                        <h3 id="newCount">0</h3>
                        <p>Новых</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white text-center">
                    <div class="card-body">
                        <h3 id="workingCount">0</h3>
                        <p>В работе</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white text-center">
                    <div class="card-body">
                        <h3 id="completedCount">0</h3>
                        <p>Завершено</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="allApplications">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Загрузка заявок...</p>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white mt-auto py-3">
    <div class="container text-center">
        <p class="small mb-0">© 2026 Водить.РФ | Речной транспорт</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
</body>
</html>
