<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация - Водить.РФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="../assets/images/logo.png" alt="Водить.РФ" width="30" height="30">
            Водить.РФ
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                <li class="nav-item"><a class="nav-link active" href="register.html">Регистрация</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Регистрация</h2>
                        <div id="message"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Логин (латиница+цифры, ≥6)</label>
                                <input type="text" name="login" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль (≥8 символов)</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ФИО (кириллица)</label>
                                <input type="text" name="full_name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Телефон (8(XXX)XXX-XX-XX)</label>
                                <input type="text" name="phone" class="form-control" placeholder="8(999)123-45-67" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>
                        <p class="text-center mt-3">Уже есть аккаунт? <a href="login.html">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white mt-auto py-3">
    <div class="container text-center">
        <p class="small mb-0">© 2026 Водить.РФ | Речной транспорт</p>
    </div>
</footer>

<script src="../assets/js/app.js"></script>
</body>
</html>
